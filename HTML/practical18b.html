<!DOCTYPE html>
<html>
<head>
    <title>practical18b.html - Registration & Login</title>
    <link rel="stylesheet" href="../CSS/practical18b.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Shemphang Lyngdoh</h1>
    <h3>This is the practical solution for practical 18b</h3>
</div>

<!-- REGISTRATION PAGE -->
<div class="container" id="registerPage">
    <h2>Registration Form</h2>

    <form onsubmit="return validateRegister()">

        <label>Name:</label>
        <input type="text" id="rname" placeholder="Enter your name">
        <span id="rnameError" style="color:red"></span><br><br>

        <label>Email:</label>
        <input type="text" id="remail" placeholder="Enter your email id">
        <span id="remailError" style="color:red"></span><br><br>

        <label>Phone Number:</label>
        <input type="text" id="phone" placeholder="Enter your phone number">
        <span id="phoneError" style="color:red"></span><br><br>

        <label>Address:</label>
        <textarea></textarea><br><br>

        <label>Date of Birth:</label>
        <input type="text" placeholder="dd-mm-yyyy"><br><br>

        <label>Age:</label>
        <input type="text"><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <span id="genderError" style="color:red"></span><br><br>

        <label>Hobbies:</label>
        <input type="checkbox">Reading
        <input type="checkbox">Traveling
        <input type="checkbox">Sports
        <input type="checkbox">Music
        <input type="checkbox">Gaming<br><br>

        <label>Upload file:</label>
        <input type="file"><br><br>

        <label>Password:</label>
        <input type="password" id="rpassword">
        <span id="rpasswordError" style="color:red"></span><br><br>

        <span id="successMsg" style="color:green; font-weight:bold;"></span><br>

        <input type="submit" value="Submit" class="btn">
        <input type="reset" value="Reset" class="btn">

    </form>

    <div class="link">
        <b>Already have an account? 
        <a href="#" onclick="showLogin()">Login</a></b>
    </div>
</div>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage" style="display:none;">
    <h2>Login Page</h2>

    <form onsubmit="return validateLogin()">
        <label>Email:</label>
        <input type="text" id="lemail">
        <span id="lemailError" style="color:red"></span><br><br>

        <label>Password:</label>
        <input type="password" id="lpassword">
        <span id="lpasswordError" style="color:red"></span><br><br>

        <input type="submit" value="Login" class="btn">
    </form>

    <div class="link">
        <b>Don’t have an account? 
        <a href="#" onclick="showRegister()">Register</a></b>
    </div>
</div>

<script>
// SWITCH
function showLogin() {
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
}

function showRegister() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("registerPage").style.display = "block";
}

// Helper functions
function showError(id, message) {
    document.getElementById(id).style.border = "2px solid red";
    document.getElementById(id + "Error").innerHTML = message;
}

function clearError(id) {
    document.getElementById(id).style.border = "2px solid green";
    document.getElementById(id + "Error").innerHTML = "";
}

// REGISTER VALIDATION
function validateRegister() {
    let name = document.getElementById("rname").value;
    let email = document.getElementById("remail").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("rpassword").value;
    let gender = document.getElementsByName("gender");

    let valid = true;

    // Name
    if (name == "" || name.length < 3) {
        showError("rname", "Enter valid name");
        valid = false;
    } else clearError("rname");

    // Email
    if (!email.includes("@") || !email.includes(".")) {
        showError("remail", "Enter valid email");
        valid = false;
    } else clearError("remail");

    // Phone
    if (phone.length != 10 || isNaN(phone)) {
        showError("phone", "Enter 10-digit number");
        valid = false;
    } else clearError("phone");

    // Password
    if (password.length < 6) {
        showError("rpassword", "Min 6 characters");
        valid = false;
    } else clearError("rpassword");

    // Gender
    let checked = false;
    for (let i = 0; i < gender.length; i++) {
        if (gender[i].checked) checked = true;
    }
    if (!checked) {
        document.getElementById("genderError").innerHTML = "Select gender";
        valid = false;
    } else {
        document.getElementById("genderError").innerHTML = "";
    }

    // Success
    if (valid) {
        document.getElementById("successMsg").innerHTML = "Registration Successful!";
    } else {
        document.getElementById("successMsg").innerHTML = "";
    }

    return false;
}

// LOGIN VALIDATION
function validateLogin() {
    let email = document.getElementById("lemail").value;
    let password = document.getElementById("lpassword").value;

    let valid = true;

    if (!email.includes("@")) {
        showError("lemail", "Invalid email");
        valid = false;
    } else clearError("lemail");

    if (password.length < 6) {
        showError("lpassword", "Invalid password");
        valid = false;
    } else clearError("lpassword");

    return false;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>practical19.html</title>
    <link rel="stylesheet" href="../CSS/practical19.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <h1>Shemphang Lyngdoh</h1>
    <p>JavaScript Built-in Objects Demonstration</p>
    <span class="file">practical19.html</span>
</header>

<!-- MAIN CARD -->
<main class="card">

    <h2 class="title">JavaScript Built-in Objects</h2>

    <!-- DATE -->
    <section class="box date">
        <h3>📅 Date Object</h3>
        <p id="date"></p>
    </section>

    <!-- MATH -->
    <section class="box math">
        <h3>🔢 Math Object</h3>
        <p id="math"></p>
    </section>

    <!-- STRING -->
    <section class="box string">
        <h3>🔤 String Object</h3>
        <p id="string"></p>
    </section>

</main>

<!-- FOOTER -->
<footer class="footer">
    © 2026 Shemphang Lyngdoh • All Rights Reserved
</footer>

<script>
    // Date Object
    let now = new Date();
    document.getElementById("date").innerHTML =
        "Current Date & Time: " + now.toLocaleString();

    // Math Object
    let random = Math.floor(Math.random() * 100) + 1;
    document.getElementById("math").innerHTML =
        "Random Number (1–100): " + random;

    // String Object
    let text = "JavaScript Built-in Objects Example";
    document.getElementById("string").innerHTML =
        "Original: " + text + "<br>" +
        "Uppercase: " + text.toUpperCase() + "<br>" +
        "Lowercase: " + text.toLowerCase() + "<br>" +
        "Length: " + text.length;
</script>

</body>
</html>

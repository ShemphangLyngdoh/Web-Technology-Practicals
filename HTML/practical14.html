<html>
  <head>
<title>Practical 14</title>

<style>
body
{
    background-color: bisque;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}

/* This is the header */
.header
{
    font-weight: bold;
    font-size: 20px;
    height: 100px;
    background-color: dodgerblue;
    color: white;
    text-align: center;
}

/* THis is the content section */
.content
{
    display: flex;
    justify-content: center;
}

.content .regForm form fieldset
{
    border: 2px solid black;
}

.content .regForm form input
{
    border: 2px solid green;
    background-color: yellow;
    border-radius: 4px;
    
}
</style>

</head>

<body>
        <!--Head Section-->
        <div class="header">
            <h3>Shemphang Lyngdoh</h3>
            <p>This is the practical solution for practical 14</p>
        </div>
        <!--Main Content-->
        <div class="content">
        <div class="regform">
            <form action="practical10.html">
                <fieldset>
                    <legend>Registration Form</legend>

                <p>
                    <label for="name">Name:</label>
                    <input type="text" placeholder="Enter your name" required>
                </p>
                <p>
                    <label for="email">Email:</label>
                    <input type="email" placeholder="Enter your email id" required>
                </p>
                <p>
                    <label for="ph_no">Phone Number:</label>
                    <input type="text" placeholder="Enter your phone number" required>
                </p>
                <p>
                    <label for="address">Address</label>
                    <textarea name="address" id="address" required></textarea>
                </p>
                <p>
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </p>
                <p>
                    <label for="age">Age:</label>
                    <input type="number" required>
                </p>
                <p>
                    <label for="gender">Gender</label>
                    <input type="radio" name="gender" id="male" >Male
                    <input type="radio" name="gender" id="female" >Female
                </p>
                <p>
                    <label for="hobbies">Hobbies:</label>
                    <input type="checkbox" name="hobbies" id="reading">Reading
                    <input type="checkbox" name="hobbies" id="traveling">Traveling
                    <input type="checkbox" name="hobbies" id="sports">Sports
                    <input type="checkbox" name="hobbies" id="music">Music
                    <input type="checkbox" name="hobbies" id="gaming">Gaming
                </p>
                <p>
                    <label for="file">Upload your file</label>
                    <input type="file" id="doc" name="doc" required>
                </p>
                <p>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </p><br>
                <p>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </p>
                <p>
                    <h4>Already have an account? <a href="practical12.html">Login</a></h4>
                </p>
                </fieldset>
            </form>
        </div>
        </div>

        <!--Footer Section-->
        <div class="footer">
            &copy;Shemphang
        </div>
    </body>
</html>

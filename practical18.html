<html>
    <head>
        <title>Practical 18</title>
        <link rel ="stylesheet" href ="../CSS/practical18.css">
    </head>
    <body>
        <div class="header">
            <h4>Shemphang Lyngdoh</h4>
            <p>This is the practical solutions for practical 18.</p>
         </div>
         
         <div class="content">
            <div class="regForm">
                
                <form action="Practical2.html" onsubmit="return validation()">
                    <fieldset>
                        <legend>Login</legend>

                        <p>
                            <label for="emailid">EmailID</label>
                            <input type="email" placeholder="Enter EmailID" id="emailid">
                            <span id="emailError" style="color:red;"></span>
                        </p>

                        <p>
                           <label for="password">Password</label>
                            <input type="password" placeholder="Enter Password" name="pwd" id="password">
                            <span id="passError" style="color:red;"></span>
                        </p>  
                        
                        <p>
                            <input type="submit" value="Login">
                        </p>
                    </fieldset>
                </form>

                <div class="validationJS">
                    <script>
                        function validation()
                        {
                            var emailID = document.getElementById("emailid").value;
                            var pwd = document.getElementById("password").value;

                            var valid = true;

                            // Email validation
                            if(emailID == "" || !emailID.includes("@") || !emailID.includes(".")) {
                                document.getElementById("emailError").innerHTML = "Enter valid email";
                                document.getElementById("emailid").style.border = "2px solid red";
                                valid = false;
                            } else {
                                document.getElementById("emailError").innerHTML = "";
                                document.getElementById("emailid").style.border = "2px solid green";
                            }

                            // Password validation
                            if(pwd == "" || pwd.length < 6) {
                                document.getElementById("passError").innerHTML = "Min 6 characters required";
                                document.getElementById("password").style.border = "2px solid red";
                                valid = false;
                            } else {
                                document.getElementById("passError").innerHTML = "";
                                document.getElementById("password").style.border = "2px solid green";
                            }

                            return valid;
                        }
                    </script>
                </div>
            </div>
          </div>
          
         <div class="footer">
            <p>&copy; Shemphang Lyngdoh</p>
          </div>
    </body>
</html>

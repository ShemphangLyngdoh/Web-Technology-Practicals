<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INSANE Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(270deg,#020617,#0f172a,#020617);
    background-size:400% 400%;
    animation:bgMove 10s infinite linear;
    color:white;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0%}
    100%{background-position:100%}
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.05);
}

/* SEARCH */
.search{
    padding:8px;
    border-radius:8px;
    border:none;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
    padding:30px;
}

/* CARD */
.card{
    padding:25px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    transition:0.3s;
    position:relative;
    transform-style:preserve-3d;
}

.card:hover{
    box-shadow:0 0 40px #38bdf8;
}

/* TAG */
.tag{
    font-size:12px;
    background:#0ea5e9;
    padding:4px 8px;
    border-radius:6px;
    margin:2px;
}

/* CURSOR GLOW */
.glow{
    position:fixed;
    width:200px;
    height:200px;
    background:radial-gradient(circle,#38bdf8,transparent);
    pointer-events:none;
    border-radius:50%;
    z-index:-1;
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>⚡ INSANE Dashboard</h2>
    <input type="text" class="search" id="search" placeholder="Search...">
</div>

<div class="grid" id="grid">

<div class="card" data-name="15a html css">
<h3>Practical 15A</h3>
<p>Layout</p>
<span class="tag">HTML</span>
<span class="tag">CSS</span>
</div>

<div class="card" data-name="15b html css">
<h3>Practical 15B</h3>
<p>Responsive</p>
<span class="tag">HTML</span>
<span class="tag">CSS</span>
</div>

<div class="card" data-name="15c html css js">
<h3>Practical 15C</h3>
<p>Interactive</p>
<span class="tag">HTML</span>
<span class="tag">CSS</span>
<span class="tag">JS</span>
</div>

</div>

<div class="glow" id="glow"></div>
<canvas id="canvas"></canvas>

<script>

/* GLOW CURSOR */
document.addEventListener("mousemove",e=>{
    let g=document.getElementById("glow");
    g.style.left=e.clientX-100+"px";
    g.style.top=e.clientY-100+"px";
});

/* MAGNETIC CARD */
document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove",e=>{
        let x=e.offsetX/20;
        let y=e.offsetY/20;
        card.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
    });
    card.addEventListener("mouseleave",()=>{
        card.style.transform="rotateX(0) rotateY(0)";
    });
});

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
    let val=this.value.toLowerCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.dataset.name.includes(val) ? "block":"none";
    });
});

/* PARTICLE NETWORK */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:Math.random()-0.5,
        vy:Math.random()-0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#38bdf8";
        ctx.fill();
    });

    // lines
    for(let i=0;i<particles.length;i++){
        for(let j=i;j<particles.length;j++){
            let dx=particles[i].x-particles[j].x;
            let dy=particles[i].y-particles[j].y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<120){
                ctx.strokeStyle="rgba(56,189,248,0.2)";
                ctx.beginPath();
                ctx.moveTo(particles[i].x,particles[i].y);
                ctx.lineTo(particles[j].x,particles[j].y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>

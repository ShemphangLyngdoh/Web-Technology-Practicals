<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Tech Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ANIMATED BACKGROUND */
body {
    height: 100vh;
    background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #020617);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #0ea5e9;
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 30px;
}

/* HEADER */
.header {
    margin-bottom: 30px;
}

.header h1 {
    font-size: 28px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

/* GLOW EFFECT */
.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #0ea5e9, #22c55e, #facc15);
    top: -50%;
    left: -50%;
    z-index: 0;
    opacity: 0;
    transition: 0.5s;
}

.card:hover::before {
    opacity: 0.3;
    transform: rotate(25deg);
}

/* CARD HOVER */
.card:hover {
    transform: translateY(-12px) scale(1.05);
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

/* LINK */
.card a {
    position: relative;
    z-index: 1;
    text-decoration: none;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

/* FOOTER */
.footer {
    margin-top: 40px;
    text-align: center;
    color: #ccc;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ Dashboard</h2>
    <a href="#">🏠 Home</a>
    <a href="#">📂 Practicals</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>🚀 Web Technology Practicals</h1>
        <p>By Shemphang Lyngdoh</p>
    </div>

    <div class="grid">
        <div class="card"><a href="HTML/practical15.html">Practical 15</a></div>
        <div class="card"><a href="HTML/practical16.html">Practical 16</a></div>
        <div class="card"><a href="HTML/practical17.html">Practical 17</a></div>
        <div class="card"><a href="HTML/practical18.html">Practical 18</a></div>
        <div class="card"><a href="HTML/practical18b.html">Practical 18b</a></div>
        <div class="card"><a href="HTML/practical19.html">Practical 19</a></div>
    </div>

    <div class="footer">
        © 2026 Shemphang Lyngdoh
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Dashboard</title>

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif;}

body {
    background:#020617;
    color:white;
    overflow:hidden;
}

/* LOADER */
#loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* TRANSITION */
#transition {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    z-index:998;
    opacity:0;
    pointer-events:none;
    transition:0.5s;
}

/* PARTICLES */
#particles {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:20px;
}

.sidebar a {
    display:block;
    margin:10px 0;
    color:#94a3b8;
    text-decoration:none;
}

/* MAIN */
.main {
    margin-left:240px;
    padding:30px;
}

/* TYPING */
#typing {
    font-size:28px;
    margin-bottom:20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* CARD */
.card {
    padding:30px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    text-align:center;
    transition:0.3s;
    transform-style:preserve-3d;
}

.card:hover {
    box-shadow:0 0 25px #0ea5e9;
}

.card a {
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* GLOW */
.glow {
    position:fixed;
    width:150px;
    height:150px;
    background:radial-gradient(circle, rgba(14,165,233,0.5), transparent);
    pointer-events:none;
    border-radius:50%;
}
</style>
</head>

<body>

<div id="loader">Loading...</div>
<div id="transition"></div>

<canvas id="particles"></canvas>
<div class="glow" id="glow"></div>

<div class="sidebar">
    <h2>🚀 Dashboard</h2>
</div>

<div class="main">

    <div id="typing"></div>

    <div class="grid">
        <div class="card"><a href="HTML/practical15a.html">Practical 15a</a></div>
         <div class="card"><a href="HTML/practical15a.html">Practical 15b</a></div>
         <div class="card"><a href="HTML/practical15a.html">Practical 15c</a></div>
        <div class="card"><a href="HTML/practical16.html">Practical 16</a></div>
        <div class="card"><a href="HTML/practical17.html">Practical 17</a></div>
        <div class="card"><a href="HTML/practical18.html">Practical 18</a></div>
        <div class="card"><a href="HTML/practical18b.html">Practical 18b</a></div>
        <div class="card"><a href="HTML/practical19.html">Practical 19</a></div>
    </div>

</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
// LOADER
window.onload = () => {
    document.getElementById("loader").style.display = "none";
};

// TYPING EFFECT
let text = "⚡ Web Technology Practicals - Shemphang Lyngdoh";
let i = 0;
function typing() {
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2});
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#38bdf8";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
        p.y+=0.5;
        if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(animate);
}
animate();

// GLOW
document.addEventListener("mousemove", e=>{
    let glow=document.getElementById("glow");
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

// CLICK SOUND + TRANSITION
document.querySelectorAll("a").forEach(link=>{
    link.addEventListener("click", e=>{
        e.preventDefault();
        document.getElementById("clickSound").play();
        let t=document.getElementById("transition");
        t.style.opacity=1;
        setTimeout(()=>{window.location=link.href},500);
    });
});

// 3D TILT
document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove", e=>{
        let x=e.offsetX;
        let y=e.offsetY;
        let centerX=card.offsetWidth/2;
        let centerY=card.offsetHeight/2;
        let rotateX=(y-centerY)/10;
        let rotateY=(centerX-x)/10;
        card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    card.addEventListener("mouseleave", ()=>{
        card.style.transform="rotateX(0) rotateY(0)";
    });
});
</script>

</body>
</html>
